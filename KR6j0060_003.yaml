body:
  text: 宋西天三藏銀青光祿大夫試光祿卿普明慈覺大師法護奉詔譯金剛藏菩薩現證儀軌王品第十一佛告金剛藏言顰眉顧視名忿怒眼二目向左顧視名信愛眼向右顧視或二目仰視並鉤召眼二目平視或視鼻準上觀出息或屏氣並信愛用觀入息鉤召用説鬼宿日觀乳木樹名信愛用以金剛杵止草木動並息災鉤召用於六月分修習相應成就無礙以佛神力不思議故得成就已令諸衆生入佛知見不應降伏作損惱事又此三昧不應分別得大罪咎諸所作事乃至語言畢竟利益若於衆生少分損害如是法印不能成就服三昧藥者住歌詠舞戲三摩呬多是所對治自他飲食如五甘露又説是相於七日中應知成就離喜過失或有殊妙言音眼目修淨身出妙香影長七步大身人來見是相已即知聖賢修瑜伽者觸彼少分得剎那頃作持明仙我今於十二廣大儀軌中略説酤羅菩薩於諸衆生速疾成就信愛之法從紇哩字觀想本尊紅色四臂手執弓箭持優鉢羅華及蓮華鉤如是觀想於三界中而為信愛於剎帝利誦真言十萬遍宰官誦一百遍於世間衆生誦一萬遍諸天誦二十萬遍阿修羅七十萬遍藥叉傍生誦一俱胝如其所説住清淨相諸佛世尊金剛堅固之身普能攝受作曼拏羅及護摩時於彼晨朝承事佛像作加持已觀想諸佛遍滿虛空隨屬本尊入已心內於真言行應當善解種種供養皆從吽字出生彼彼真言曰唵引嚩日囉二合補瑟閉二合阿引吽引薩嚩二合訶唵引嚩日囉二合度閉引阿引吽引薩嚩二合訶唵引嚩日囉二合禰引閉引阿吽引薩嚩二合訶唵引嚩日囉二合唁提阿引吽引薩嚩二合訶唵引嚩日囉二合乃尾儞引阿引吽引薩嚩二合訶獻阿伽水儀軌次第如前已説我今復説成就護魔法息災圓爐白色廣一肘半深等半增益四方黃色廣二肘深一肘降伏三角黑色廣十指深五指信愛紅色鉤召如信愛同忿怒與降伏同息災用脂麻增益用酪降伏用羯諾迦木忿怒用棘木信愛鉤召並用紅優鉢羅華火天歡喜真言曰唵引阿枿那二合曳摩訶引帝惹薩哩嚩二合歌引摩鉢囉二合娑引馱各歌引嚕拏也二合訖哩二合多薩埵引囉他二合遏悉銘二合散儞呬都婆嚩阿枿那也三合嚩引喝那怛鑁二合儞尾索引叱部引多引枲呬嚩日囉二合酤引馱布引𡁠底那引那引囉怛那二合馱哩引馱引底哩二合引阿母酤引㰠曼拏朗栗契多莎哩覃二合拶嚩鉢囉二合哩覃二合拶娑引提耽枿𢴉賀咩部葛阿引枿弭奢悉野他引歌引梨薩哩嚩二合悉提酤嚕薩嚩二合彌獻閼伽水真言曰唵引𠺁吽引鑁斛龕囕淨水真言曰唵引梨引梨引吽引恪獻食真言曰唵引探探熾盛拏吉尼所説成就品第十二復次金剛藏言世尊於諸法海云何為求成就者略説如是本尊色相佛言為於無我明妃或吉祥呬嚕迦一剎那頃知彼安住及於廣大清淨儀軌若時若處最初修習是故略説復次持真言者一心成就三摩呬多於己住舍或夜時分發勤勇心以勝慧相應觀想吉祥呬嚕迦像澡浴塵穢著新淨衣以旃檀香塗瑩手足嚼豆䓻齒木及妙香果無非時食如佛世尊求出離想親近智者觀想行人於剎那頃忽起異相於所持明心難調柔爾時行者不應止息決定精勤趣求成就佛告金剛藏言我説禪定心能壞煩惱毒求成就者極善籌量於一月分心存聖像離諸攀緣或一日中相續觀想隨其所辦得大果利所有輪轉自他二利非餘方便速能修習於所持明而常現前求成就者如是煩惱迷醉憂悲病苦熾然三毒説剎那頃如實相應而得不墮五無間處設有屠膾卑賤醜陋身不具足造惡業者思求成就應修十善尊重愛樂密護根門是人決定離瞋慢習而得成就三摩呬多設此時分於祕密行乃至法印未得成就自然得是持明智者或瑜擬尼而來為説攝受某印執金剛杵利益衆生或得廣大莊嚴具相童子以悉囉訶香和合龍腦以菩提心加持散之應當一心觀彼聖像彼或為説十善等法知實明了得彼成就無復疑惑或勝那哩及自眷屬亦應觀想若天若人阿修羅緊那羅夜叉女等彼亦領解自所行行當生信敬勿起邪思瞋怒色相復次金剛藏言世尊於無我理已具足説復何印所印處二種成就佛言如來大悲隨所應現具相明妃住蓮華族捨幻化相而能照解勝惠方便二種生滅是二邊際非生非滅即真實性又此滅處處無有性滅無盡故瑜伽生滅次第如是又修觀者從戲論生如夢所作了如幻覺實無戲論是中所説如曼拏羅現諸色相和合出生灌頂大印及大妙樂如是了知唯大威力青黃赤緑及黑白色行非行等勝惠方便二種相因説金剛薩埵有妙樂性於曼拏羅餘無作用時金剛藏白佛言世尊是大妙樂自所相應出生次第若非有性復何所用佛言快哉大士以信除疑我説世間身所妙樂能觀所觀如華有香華性若無香不可得身相妙樂亦復如是於性無性如佛知覺癡暗無知及餘怯弱悉能破壞彼金剛喻沙三摩地極妙樂行唯一體相為佛實藏我所説法聞自功德信順世出世間為調御者離喜俱生喜等即我自性如以燈明破諸黑暗三十二相八十種好皆樂輪之所安住彼相若無是義非有於諸聖天不應棄捨是故覺非有性色亦無性諸相非相皆勝妙樂又諸世間自他色相悉俱生故心相清淨即名還滅若於本尊相應出生威儀色相及安住處如彈指頃而執著者譬少毒藥能害多命知彼毒已還能壞毒又於分別而強分別以清淨有破煩惱有如風病人食摩沙豆發病愈風名顛倒藥於相決定而常尋伺而為分別一切法性譬如有人少水入耳還以水取又諸衆生貪火所燒為諸惡業之所纏縛我以方便為説貪火而令解脫如若有人為火燒烙還炙以火即以是貪令斷貪縛而不能知是顛倒觀想者是人名為佛法中外道又蓮華部相應分別此五大種觸堅硬性而生執著對治癡法是即地界毗盧遮那如來為菩提心之所容受色身業用是即水界阿閦如來水地相搖熱觸生火對治貪熾是即火界無量壽如來思惟餘部有動轉相對治嫉妬是即風界不空成就如來於此妙樂而生愛樂即虛空相對治兩舌是即空界寶生如來此五大種於剎那頃心能了知等同一味是故於勝喜中分別貪等五火與大妙樂同一本性有十殑伽沙數如來衆同是一部於是一部復有百萬無數大俱胝部是勝喜中得如是部説方便品第十三復次宣説一切金剛儀軌瑜擬尼方便灌頂戒謂分別剎那飲食喜等諸佛如來安住鑁字正等一相得灌頂成就復次金剛薩埵白佛言世尊如是鑁字云何説為拏吉尼戒如來為調御師願為我説如其次第佛言是中鑁字唯一體性最上莊嚴為阿賴耶諸佛寶藏於初喜等分別剎那住妙樂智謂莊嚴果報作觀離相修瑜伽者於四剎那正行當如是知莊嚴者即初喜中方便為説種種理事果報者謂即勝喜知妙樂觸作觀者謂即離喜我所受用為説尋伺離相者即俱生喜遠離三種貪與無貪及彼中間復次灌頂阿闍梨以四種祕密觀想次第發清淨心熙怡顧視知具福慧滅除煩惱於諸衆生因緣成熟為説四種澡沐灌頂以二手執金剛鈴杵其灌頂者面目熙怡莊嚴色相以大拇指無名指施設種種供養已為説攝受大印知彼弟子是大種族遠離瞋恚及我慢習調御教誨執金剛杵隨其本尊説灌頂作用相應契印見自師尊恭敬供養如佛世尊具大寂靜於此金剛瑜伽出生成就印法不應分別又應如我以大威力於生死泥拔濟沈溺作大歸救爾時弟子執金剛杵以盡世甘美廣大飲食燒香塗香幢幡寶鐸及妙華鬘是等供養於種種勝喜妙樂剎那遠離乃至菩提最後邊際持金剛杵利諸含識又為弟子説大悲智安住一切是身非身無有二相觀動植等皆幻化相輪壇方便畢竟無疑諸同學者如己眷屬時金剛藏白佛言世尊云何名諸佛身最上輪壇如其次第為我除疑佛言是曼拏羅者堅固菩提心作大施會如虛空輪清淨境界應知是名金剛瑜伽蓮華部義時金剛藏復白佛言世尊持何等戒住何三昧佛言一者不應殺害衆生當共一心如護己有二者無不與故取他人玩好三者無欲邪行知本性空故四者無虛妄語世出世間發最上願時諸瑜伽者於佛世尊作如是言云何名根境云何十二處何等名蘊界復何為自性佛言根有六謂眼耳鼻根與身舌意等內外根癡俱以金剛解脫又境有六塵謂色聲香味及與觸境界并法界自性是名為六境即前根境二翻名十二處五蘊謂色等及大悲行性如是根境識説名十八界是故瑜伽者於此能悟了彼自性不生真實無妄失一切盡知解猶如水中月又如撚箭手云何生火相是火非箭出亦非撚人手諸相盡度量俱時無所得又此所生火非假亦非實是故諸法中應如是作意
