body:
  text: 宋西天三藏銀青光祿大夫試光祿卿普明慈覺傳梵大師法護奉詔譯金剛部序品第一如是我聞一時薄伽梵住一切如來身語心金剛喻施婆倪數祕密中祕密出生妙三摩地時彼世尊從是三摩地起讚言善哉善哉金剛藏菩薩摩訶薩奇哉金剛薩埵大薩埵三昧耶薩埵悉從大悲空智金剛大菩提心之所開示爾時金剛藏菩薩聞是語已即白佛言世尊云何金剛薩埵云何大薩埵云何三昧耶薩埵唯願世尊為我解說佛告金剛藏菩薩金剛者謂不可破壞薩埵者謂三有一性勝慧相應是名金剛薩埵謂於大智勝味充滿是名大薩埵謂常行三昧是名三昧耶薩埵時金剛藏菩薩重白佛言世尊空智金剛者於如是名云何攝受云何名空智何等名金剛佛告金剛藏菩薩空智者謂即大悲空智金剛者體即勝慧以勝慧方便成就儀軌於彼見聞有大力能種種成辦謂降伏禁止或却他軍及瑜擬尼如其正理生住因緣以識智成辦如其出現諸佛聖賢是為空智最初出生行相又復於大悲性如是解脫則於縛性縛遍能了知悉皆解脫所以者何彼勝慧性及所知性悉非性故彼空智性亦非性故以本然智決諸疑網照解諸法本然不起時金剛藏菩薩重白佛言世尊如是空智云何而有血脈之相佛告金剛藏菩薩彼血脈相有三十二種是名三十二菩提之心又此漏法於大樂處總有三種謂羅羅拏辣娑摩阿嚩底羅羅拏者即勝慧自性辣娑拏者謂善方便阿嚩底者是中說離能取所取又此三種即是住持不動清淨智月彼三十二種血脈者謂一者不可破壞二者微妙色相三者天四者左邊際五者短六者酤摩惹七者性八者施迦九者過失十者阿尾吒十一者本母十二者設哩嚩梨十三者清涼十四者焰熾十五者羅羅拏十六者辣娑拏十七者阿嚩底十八者量十九者青色二十者平等二十一者因二十二者相應二十三者喜二十四者成就二十五者暖二十六者蘇末他二十七者轉二十八者欲二十九者忿怒三十者迦多演尼三十一者童子三十二者施設是名三十二種血脈之相復次金剛藏菩薩白佛言世尊此何因緣有如是相佛告金剛藏菩薩謂欲成熟三有遠離一切能取所取以諸方便了別性相為持戒者分別解說諸佛賢聖智慧方便三身三業及伊鑁摩野謂伊者佛眼母菩薩鑁者摩摩枳菩薩摩者白衣菩薩野者多羅菩薩又復法身輪者具八輻相報身輪者具十六輻化身輪者具蓮華相六十四葉大藥輪者具三十二幅建此輪者如是次第有四剎那謂莊嚴果報作觀離相依四聖諦謂苦集滅道依四真實謂身真實智真實持明真實聖賢真實有四歡喜謂喜勝喜離喜俱生喜等依四種律謂上座部大衆部正量部一切有部日月時分晝夜增減謂於八時有十六分三十二點六十四刻如是一切四種最初贊拏梨明妃從彼臍輪發大智火焚棄五蘊以佛眼母焚燼諸漏除妄因緣故拏吉尼熾盛威儀真言品第二施一切地上飲食真言曰唵引一阿吽引三發吒半音莎引賀引下同四佛言唵阿者作一切法出生門故五如來種子者所謂捫一盎二𡁠陵二合引三龕四吽五引空智金剛心真言曰唵引一禰嚩畢祖二嚩惹囉二合吽引三吽引四吽引五發吒半音莎賀六佛言一切真言句首當安唵字次置吽發吒字後用莎賀字阿閦如來真言曰唵引一遏二葛三拶四吒五多六波七野設莎賀八佛言一切瑜擬尼種子字遏一阿引二一三翳引四嗢五污引六哩七梨八嚕九盧十伊十一愛引十二塢十三奧引十四暗十五惡十六二臂明王真言曰唵引一怛懶二合路引歌引二叱波各引三吽引四吽引五吽引六發吒半音莎賀七四臂明王真言曰唵引入嚩二合囉二入嚩二合囉毗喻二合引三吽引四吽引五吽引六發吒半音莎賀七六臂明王真言曰唵引一吉胝吉胝二嚩惹囉二合吽引三吽引四吽引五發吒半音莎賀六加持真言曰唵引一阿引二吽引三淨地真言曰唵引一犖叉上呂角切下同犖叉二犖叉吽引三吽引四吽引五發吒半音莎賀六禁止真言曰唵引一吽引二莎賀三發遣真言曰唵引一龕二莎賀三忿怒真言曰唵引一紇陵二合引二莎賀三降伏真言曰唵引一吽引二莎賀三鉤召真言曰唵引一枯二莎賀三又降伏真言曰唵引一捫二莎賀三信愛真言曰唵引一酤嚕梨引二紇哩二合引三莎賀四佛言若天旱時欲請雨者先建曼荼羅用寒林線絣量界道於壇中心以寒林中五色粉骨作白粉炭作黑粉甎作赤粉雄黃作黃粉陬羅葉作緣粉以石碌代之粉畫空智金剛大明王八面四足一十六臂面各三目作忿怒相踏阿難陀龍王復以香泥捏造阿難陀龍王像其龍王及妃種子字並用朴堊以五甘露沐浴散黑色花次以龍華樹汁塗之或以白蒿汁代之復以象眵塗龍王頂上於黑月十四日取黑牛乳盛滿器中令黑色童女合青色線於壇西北隅開一小池以阿難陀龍王安彼池中然後阿闍梨依法厲聲無間誦此請雨真言曰唵引一苦嚕苦嚕二渴痆女轄切下同渴痆三末娑末娑四渴吒渴吒五枯吒野枯吒野六阿難多七閦婆葛囉引野八那引誐引提鉢多曳九呬呬嚕嚕紺十薩鉢多二合播引多引羅誐耽引十一那引誐引那引歌引哩沙二合野十二末哩沙二合野十三誐哩惹二合野十四撲十五撲十六撲十七撲十八撲十九撲二十撲二十一撲二十二吽引二十三吽引二十四吽二十五莎賀二十六誦此真言若時不雨即當倒誦此呪降霔大雨又若不雨令彼龍王頭破七分如蘭香梢若欲止雨取寒林衣置於坐下誦此真言即能止雨止雨真言曰唵引一阿哩也二合二設摩二合舍引那畢哩二合夜引野三吽引四吽引五吽引六發吒半音七復次成就法謂降伏他軍速令破壞當用畫石為末入五甘露以斷鐵草和合為丸加持誦此真言曰唵引一嚩惹囉二合葛哩多二合哩二呬嚩惹囉二合引野三吽引四吽引五吽引六發吒半音七應先誦此真言一十萬遍或一百萬遍得成就已即用前藥丸畫瓶器頂悉令周匝無使斷絶即得他軍速皆破壞若欲成就底羅紺法當用末羅摩子白色曼度迦華及斷鐵草阿閦毗藥於日蝕時和合作鉞斧形踏兩足下誦此真言曰唵引一嚩惹囉二合酤吒引囉二播引吒野播引吒野三吒吒四吽引五吽引六吽引七發吒莎賀八誦此真言一百萬遍即得成就一切聖賢尚不違越何況破壞焰摩羅界復次成就法若欲作諸瘧病於阿哩迦樹葉上用唧多迦毒辣藥書彼設覩嚕名字棄擲稻糠火中誦此真言曰唵引一呬引嚩惹囉二合二入嚩二合囉入嚩二合囉三設咄籠二合四勃籠二合五吽引六吽引七吽引八發吒莎賀誦此真言一阿庾多即得成就若欲成就開摩黏法於自臍輪作是觀想或於腹上觀想成辦然後乃見摩黏自開若欲作信愛法於月八日分詣無憂樹下著赤色衣食未捺那果以肝摩唧歌樂汁塗於額上誦此真言曰唵引一阿目計引弭二紇哩二合引嚩施引三婆鑁覩四娑引賀引五誦此真言一阿庾多無令間斷即得成就若欲制止日月當用阿闍梨飯作日月狀置金剛水中誦此真言曰唵引一嚩惹囉二合哩葛二合引二摩引左羅三摩引左羅四底瑟吒二合五底瑟吒二合六呬嚩惹囉二合引七野吽引八吽引九吽引十發吒十一莎賀十二誦此真言七百萬遍即得日月制止於彼晝夜無能分別又金剛喻沙多成就法於日後分令一具相童女以諸香華供養念此真言一百八遍然後用油沐浴取多羅樹汁塗於童女大拇指上及用此真言加持即時應現乃問三世之事時彼童女隨問為說誦真言唵引一那誐囉二合引那誐囉二合引又成就法尾盧野引尾盧野引誦此真言時象即奔走曼摩引曼摩引誦此呪時虎即奔走底梨野引底梨野引誦此呪時熊即奔走伊梨弭梨撲撲誦此呪時蛇即奔走佛告金剛藏菩薩如我往昔亦以是法調伏護藏醉象悉令奔走此遨哩明妃設嚩哩明妃金剛拏吉尼即無我義彼地行空行鉤召發遣悉相應故一切如來身語心聖賢品第三最初觀於慈次即觀於悲第三當觀喜一切處學捨初空性菩提第二集種子三成辦形像後當觀字義現前觀囉字成熾盛日輪於彼日輪中吽字金剛業又復觀杵形牆網悉周遍先觀沒哩多成法界智者行人坐其上自體即空智自心想囉字成輝曜日輪於中觀吽字惠方便自性青色大忿怒金剛吽歌囉以內心真實猶若金剛杵又復觀吽字出生忿怒相謂大悲金剛猶如青蓮色此大悲金剛或如日暉色見彼若虛空當如是信解持諸莊嚴具供養八明妃遨哩鹿郎蹉陬哩摩痆器尾多梨者水渴三摩哩藥卜葛西獻杵設嚩哩六味贊拏哩音樂供養於本尊努弭哩歌舞彼妙樂大樂隨日月晝夜住是種子中說如是有情勝歡喜自性轉現大神通廣覆虛空壇漸略一心中悉成忿怒相青色日輪中眼紅曼度迦髮纏金色髻用五印莊嚴輪環及瓔珞手釧金色帶表五佛清淨說此名印契見彼忿怒相十六童女形左手持金剛及彼葛波羅朅椿誐亦然右手青色杵應詣寒林中成就本所尊口誦吽迦囉八明妃圍繞隨其方便說自身即寒林四臂謂四魔令降伏清淨應誦於吽字色相如前說彼左第一臂手執葛波羅以天阿修羅盛甘露充滿次右第一臂手執金剛杵次左第二臂及右第二手般若蜜多教或即佛形像次三面六臂左手持甘露右手或日月彼最初青色臂相如前說都無有是相清淨波羅蜜彼左第一臂手執三戟叉次右第一臂手執金剛杵左第二臂鈴右第二執刀餘左右二臂金剛星伽羅以二種和合佛像般若教或復左右手刀及葛波羅應於空寂處成辦三界事賢聖灌頂部品第四先於自心及自種子出生黑色熾然光焰左手執鉤右手期剋如佛住三界中鉤召八大明妃隨其供養本尊先以唵字得一切如來灌頂即以彼佛成空智明王相持五甘露成辦五如來賢瓶作五種灌頂當灌頂時散衆名華及鬱金香擊鼓歌詠供養金剛部佛眼母等而能成辦空智三界加持於四威儀如彼聖賢當如是知大真實品第五一切法自性於此悉皆無謂非色非聲即無聞無見及非香味觸亦無能觸等善解瑜伽者非心非所緣於諸母姊妹亦應常供養彼努弭明妃如那胝染師贊拏哩明妃猶若淨行女勝慧方便中依供養儀軌如其不分別當覲策親近若非祕密者當獲如是苦墮咩拏賊中履猛火地上此五部印呪說為解脫因而復說此印名金剛祕密謂金剛蓮華事業如來寶說如是五部為最上大悲金剛努彌印蓮華舞亦然事業為染師如來清淨女寶部贊拏哩此五印決定如來部亦然總略而分別去即如來行來即吉祥座以勝慧相應是如來所說開說為六種總略唯五部後復有三事謂身語意業又說此五部即五蘊自性如是出生身是說為此部無所觀聖像亦無能觀者無真言住處成五種自性大毗盧遮那及阿閦如來不空成就佛寶生無量壽梵王尾瑟拏及與大自在一切眷屬等故真實開示梵王成正覺尾瑟努信愛大自在吉祥一切常安住廣大真常樂開悟令愛樂如是自身中出生諸賢聖是人有福智猶如薄伽梵自在熾盛等具足六種德又如佛世尊破諸煩惱魔亦如大智母出生諸有性勝慧諸姊妹能分別顯現復如染師女作歌詠舞戲念彼如染師親近諸衆生說彼如女人出生諸功德歌詠如勝慧旋轉成大悲說努弭明妃故不受諸觸於彼諸聖賢說多種稱贊當畫曼拏羅行相如前說如其以指縛或作掣開印於彼靜思惟隨應成觀行獲如是妙樂於自常受用淨盡生老門說名安樂定
